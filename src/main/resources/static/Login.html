    
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Chess Master - Đăng Nhập</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    
    
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#cf7317",
                "background-light": "#f8f7f6",
                "background-dark": "#26211e", 
              },
              fontFamily: {
                "display": ["Segoe UI", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
    
    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/login.css" rel="stylesheet">
</head>

<body class="min-h-screen flex items-center justify-center p-4 overflow-x-hidden">
    <div class="fixed inset-0 z-0">
        <div class="w-full h-full bg-center bg-cover scale-105 blur-[2px] brightness-enhanced transition-all duration-700" 
             style="background-image: url('images/anh1.png');">
        </div>
        <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/40"></div>
    </div>

    
    <div class="relative z-10 w-full max-w-[440px] animate-fade-in">
        <div class="flex flex-col items-center mb-10 text-center">
            <div class="w-24 h-24 bg-primary rounded-2xl flex items-center justify-center mb-6 shadow-2xl shadow-primary/30 transform transition-all hover:rotate-3 hover:scale-110 cursor-default">
                <span class="material-symbols-outlined text-white text-6xl">chess</span>
            </div>
            <h1 class="text-white tracking-[0.2em] text-4xl font-black leading-tight uppercase font-display mb-3 drop-shadow-md">
                CHESS MASTER
            </h1>
            <div class="h-1 w-16 bg-primary mb-4 rounded-full"></div>
            <p class="text-white/80 text-sm font-medium tracking-widest opacity-90 uppercase">Nền tảng cờ vua trực tuyến</p>
        </div>

        
        
        <div class="form-container backdrop-blur-xl border border-white/20 p-10 rounded-2xl shadow-2xl">
            <form action="/login-submit" method="POST" class="space-y-6">
                
                
                <div class="flex flex-col gap-2">
                    <label class="flex flex-col w-full">
                        <p class="text-white/90 text-sm font-bold pb-2 px-1">Tên đăng nhập</p>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/70 text-xl transition-colors group-focus-within:text-primary">person</span>
                            <input name="username" required
                                   class="input-glow form-input flex w-full rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-white/10 bg-white/5 focus:border-primary h-14 placeholder:text-white/30 pl-12 pr-4 text-base transition-all hover:bg-white/10" 
                                   placeholder="Nhập tài khoản" 
                                   type="text"/>
                        </div>
                    </label>
                </div>

                
                <div class="flex flex-col gap-2">
                    <label class="flex flex-col w-full">
                        <div class="flex justify-between items-center pb-2 px-1">
                            <p class="text-white/90 text-sm font-bold">Mật khẩu</p>
                            <a href="ForgotPassword.html" class="text-primary text-xs font-bold underline hover:text-white transition-all">Quên mật khẩu?</a>
                        </div>
                        <div class="relative flex w-full items-stretch group">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/70 text-xl transition-colors group-focus-within:text-primary">lock</span>
                            <input name="password" required
                                   class="input-glow form-input flex w-full rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-white/10 bg-white/5 focus:border-primary h-14 placeholder:text-white/30 pl-12 pr-4 text-base transition-all hover:bg-white/10" 
                                   placeholder="Nhập mật khẩu" 
                                   type="password"/>
                        </div>
                    </label>
                </div>

                
                <div id="error-alert" class="hidden animate-pulse bg-red-500/10 border border-red-500/20 rounded-xl p-3">
                    <p class="text-red-500 text-[11px] font-black uppercase text-center tracking-widest">
                        Sai tài khoản hoặc mật khẩu!
                    </p>
                </div>

                
                <div class="pt-2">
                    <button class="w-full bg-primary hover:bg-[#e07d1a] text-white font-black py-4 rounded-xl transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-xl shadow-primary/30 text-lg uppercase tracking-[0.1em]" 
                            type="submit">
                        ĐĂNG NHẬP
                    </button>
                </div>

                <div class="flex items-center gap-4 py-1">
                    <div class="h-[1px] flex-1 bg-white/10"></div>
                    <span class="text-[10px] font-black text-white/20 uppercase tracking-[0.2em]">Hoặc</span>
                    <div class="h-[1px] flex-1 bg-white/10"></div>
                </div>

                
                <div>
                    <button type="button" 
                            onclick="window.location.href='Lobby.html?user=false'"
                            class="w-full bg-white/5 hover:bg-white/10 text-white/90 font-black py-4 rounded-xl border border-white/10 transition-all flex items-center justify-center gap-3 group uppercase text-lg tracking-[0.1em]">
                        <span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">person_search</span>
                        Vào chơi ngay (Khách)
                    </button>
                </div>

                <div class="text-center pt-4 border-t border-white/5 mt-4">
                    <p class="text-white/60 text-sm font-medium">
                        Bạn là người mới? 
                        <a class="text-primary font-black hover:text-white ml-1 transition-all underline decoration-2 underline-offset-4" 
                           href="Register.html">Đăng ký ngay</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    
    <script>
        
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            document.getElementById('error-alert').classList.remove('hidden');
        }
        
        if (urlParams.get('reset') === 'success') {
            const alert = document.getElementById('error-alert');
            alert.classList.remove('hidden', 'bg-red-500/10', 'border-red-500/20');
            alert.classList.add('bg-green-500/10', 'border-green-500/20');
            alert.querySelector('p').className = 'text-green-400 text-[11px] font-black uppercase text-center tracking-widest';
            alert.querySelector('p').textContent = 'Đổi mật khẩu thành công! Hãy đăng nhập lại.';
        }
    </script>
</body>
</html>
